name: Selenium E2E Tests

# This tells GitHub to run the tests every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # This gives you a free Linux server to run your tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Project Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Execute Tests via Maven
      # Forces headless mode via the command line to ensure it runs without a screen
      run: mvn clean test -Dheadless=true

    - name: Upload Extent Report
      # The 'always()' command ensures the report is uploaded even if tests fail
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: Automation-Test-Report
        path: test-output/ExtentReport.html